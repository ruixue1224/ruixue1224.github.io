<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
#span{
            color: lightgreen;
        }
    </style>

</head>
<body onload="time()">
<h2 id="showtime"></h2>
<span id="span"></span>
<script type="text/javascript">
    function runtime(){
        // 初始时间，日/月/年 时:分:秒
        X = new Date("09/27/2024 18:41:00");
        Y = new Date();
        T = (Y.getTime()-X.getTime());
        M = 24*60*60*1000;
        a = T/M;
        A = Math.floor(a);
        b = (a-A)*24;
        B = Math.floor(b);
        c = (b-B)*60;
        C = Math.floor((b-B)*60);
        D = Math.floor((c-C)*60);
        //信息写入到DIV中
        span.innerHTML = "瑞雪的博客已经诞生: "+A+"天"+B+"小时"+C+"分"+D+"秒了"
    }
    setInterval(runtime, 1000);
</script>



</body>
</html>
